<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LunaGuide" />
  <meta name="description" content="CraftLuna AI Asistan — LunaGuide" />
  <title>🌕 LunaGuide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --bg2: #0f1626;
      --bg3: #151d32;
      --gold: #f5c842;
      --gold2: #e6a800;
      --gold-dim: rgba(245,200,66,0.12);
      --blue: #1a2744;
      --blue2: #243460;
      --text: #e8eaf0;
      --text2: #9ba3b8;
      --user-bubble: #1e3a6e;
      --ai-bubble: #151d32;
      --border: rgba(245,200,66,0.18);
      --radius: 18px;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    /* Stars background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 85%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(2px 2px at 75% 25%, rgba(245,200,66,0.15) 0%, transparent 100%),
        radial-gradient(2px 2px at 25% 60%, rgba(245,200,66,0.1) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    .header {
      background: linear-gradient(180deg, rgba(10,14,26,0.98) 0%, rgba(15,22,38,0.95) 100%);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .header-moon {
      font-size: 28px;
      filter: drop-shadow(0 0 8px rgba(245,200,66,0.6));
      animation: moonPulse 3s ease-in-out infinite;
    }

    @keyframes moonPulse {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(245,200,66,0.6)); }
      50% { filter: drop-shadow(0 0 16px rgba(245,200,66,0.9)); }
    }

    .header-info { flex: 1; }

    .header-title {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(245,200,66,0.4);
    }

    .header-sub {
      font-size: 11px;
      color: var(--text2);
      margin-top: 1px;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #4ade80;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 1;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { display: none; }

    /* WELCOME */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 20px 10px;
      gap: 12px;
      animation: fadeIn 0.6s ease;
    }

    .welcome-moon {
      font-size: 56px;
      filter: drop-shadow(0 0 20px rgba(245,200,66,0.7));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .welcome h2 {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(245,200,66,0.4);
    }

    .welcome p {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
      max-width: 280px;
    }

    /* QUICK QUESTIONS */
    .quick-btns {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 340px;
    }

    .quick-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quick-btn:active, .quick-btn:hover {
      background: var(--gold-dim);
      border-color: var(--gold);
      transform: scale(0.98);
    }

    .quick-btn span { font-size: 16px; }

    /* MESSAGES */
    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: slideUp 0.3s ease;
      max-width: 100%;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-items: flex-end; }
    .message.ai { align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      max-width: 85%;
      word-break: break-word;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #1e3a6e, #2a4f96);
      border: 1px solid rgba(100,140,255,0.3);
      border-bottom-right-radius: 4px;
      color: #e8eeff;
    }

    .message.ai .bubble {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .ai-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 11px;
      color: var(--gold);
      font-weight: 600;
    }

    .bubble img {
      max-width: 100%;
      border-radius: 10px;
      margin-bottom: 6px;
      display: block;
    }

    .file-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(245,200,66,0.12);
      border: 1px solid rgba(245,200,66,0.25);
      border-radius: 8px;
      padding: 4px 9px;
      font-size: 12px;
      color: var(--gold);
      margin-bottom: 6px;
    }

    /* TYPING INDICATOR */
    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 10px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: typingDot 1.2s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingDot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* PREVIEW ATTACHMENTS */
    .attachments-preview {
      display: flex;
      gap: 8px;
      padding: 8px 12px 0;
      flex-wrap: wrap;
      z-index: 1;
    }

    .attach-item {
      position: relative;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 6px;
      max-width: 160px;
    }

    .attach-item img {
      width: 36px; height: 36px;
      object-fit: cover;
      border-radius: 6px;
    }

    .attach-remove {
      background: rgba(255,60,60,0.2);
      border: none;
      color: #ff6060;
      border-radius: 50%;
      width: 18px; height: 18px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* INPUT AREA */
    .input-area {
      background: linear-gradient(0deg, rgba(10,14,26,0.99) 0%, rgba(15,22,38,0.97) 100%);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 10;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      padding: 8px 10px 8px 14px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245,200,66,0.1);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 1.5;
      padding: 0;
    }

    textarea::placeholder { color: var(--text2); }

    .input-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text2);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .icon-btn:active { transform: scale(0.88); }
    .icon-btn:hover { color: var(--gold); background: var(--gold-dim); }

    .icon-btn.recording {
      color: #ff4444;
      background: rgba(255,68,68,0.15);
      animation: recordPulse 1s ease-in-out infinite;
    }

    @keyframes recordPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(255,68,68,0); }
    }

    .send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #0a0e1a;
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(245,200,66,0.4);
    }

    .send-btn:active { transform: scale(0.9); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #imgInput, #fileInput { display: none; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (min-width: 480px) {
      body { max-width: 480px; margin: 0 auto; }
      .chat-area::-webkit-scrollbar { display: block; width: 4px; }
      .chat-area::-webkit-scrollbar-track { background: transparent; }
      .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-moon">🌕</div>
  <div class="header-info">

    <div class="status-dot"></div>

  </div>
</div>

<div class="chat-area" id="chatArea">

  </div>
</div>

<div class="attachments-preview" id="attachPreview"></div>

<div class="input-area">

    <textarea id="msgInput" placeholder="CraftLuna hakkında sor..." rows="1"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <div class="input-actions">
      <button class="icon-btn" onclick="document.getElementById('imgInput').click()" title="Fotoğraf ekle">📷</button>

      <button class="icon-btn" id="micBtn" onclick="toggleMic()" title="Sesli soru">🎙️</button>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Gönder">➤</button>
    </div>
  </div>
</div>

<input type="file" id="imgInput" accept="image/*" onchange="handleImage(event)" />
<input type="file" id="fileInput" accept=".pdf,.txt" onchange="handleFile(event)" />

let messages = [];
let pendingImage = null;
let pendingFile = null;
let isRecording = false;
let recognition = null;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function quickAsk(q) {
  document.getElementById('msgInput').value = q;
  autoResize(document.getElementById('msgInput'));
  sendMessage();
}

function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImage = { base64: ev.target.result.split(',')[1], type: file.type, name: file.name };
    renderAttachPreview();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  if (file.type === 'application/pdf') {
    reader.onload = ev => {
      pendingFile = { base64: ev.target.result.split(',')[1], type: 'application/pdf', name: file.name };
      renderAttachPreview();
    };
    reader.readAsDataURL(file);
  } else {
    reader.onload = ev => {
      pendingFile = { text: ev.target.result, name: file.name };
      renderAttachPreview();
    };
    reader.readAsText(file);
  }
  e.target.value = '';
}

function renderAttachPreview() {
  const el = document.getElementById('attachPreview');
  el.innerHTML = '';
  if (pendingImage) {
    el.innerHTML += `<div class="attach-item">
      <img src="data:${pendingImage.type};base64,${pendingImage.base64}" />
      <span style="font-size:11px;color:var(--text2);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${pendingImage.name}</span>
      <button class="attach-remove" onclick="pendingImage=null;renderAttachPreview()">✕</button>
    </div>`;
  }
  if (pendingFile) {
    el.innerHTML += `<div class="attach-item">
      <span>📎</span>
      <span style="font-size:11px;color:var(--text2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${pendingFile.name}</span>
      <button class="attach-remove" onclick="pendingFile=null;renderAttachPreview()">✕</button>
    </div>`;
  }
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Tarayıcınız sesli giriş desteklemiyor. Chrome kullanmayı deneyin.');
    return;
  }
  if (isRecording) {
    recognition && recognition.stop();
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'tr-TR';
  recognition.interimResults = false;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
  };
  recognition.onresult = e => {
    const txt = e.results[0][0].transcript;
    document.getElementById('msgInput').value = txt;
    autoResize(document.getElementById('msgInput'));
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    sendMessage();
  };
  recognition.onerror = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
  };
  recognition.start();
}

function addMessage(role, text, imgBase64, imgType, fileName) {
  const area = document.getElementById('chatArea');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;

  let inner = '';
  if (role === 'ai') {
    inner += `<div class="ai-header">🌕 LunaGuide</div>`;
  }

  let bubbleContent = '';
  if (imgBase64) {
    bubbleContent += `<img src="data:${imgType};base64,${imgBase64}" alt="Eklenen görsel" />`;
  }
  if (fileName) {
    bubbleContent += `<div class="file-tag">📎 ${fileName}</div>`;
  }
  bubbleContent += text.replace(/\n/g, '<br>');

  inner += `<div class="bubble">${bubbleContent}</div>`;
  div.innerHTML = inner;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typingMsg';
  div.innerHTML = `<div class="ai-header">🌕 LunaGuide</div><div class="typing"><span></span><span></span><span></span></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text && !pendingImage && !pendingFile) return;

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  const displayText = text || (pendingImage ? '📷 Görsel hakkında soru' : '📎 Dosya hakkında soru');
  addMessage('user', displayText, pendingImage?.base64, pendingImage?.type, pendingFile?.name);
  input.value = '';
  input.style.height = 'auto';

  const userContent = [];
  if (pendingImage) {
    userContent.push({ type: 'image', source: { type: 'base64', media_type: pendingImage.type, data: pendingImage.base64 } });
  }
  if (pendingFile) {
    if (pendingFile.base64) {
      userContent.push({ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: pendingFile.base64 } });
    } else if (pendingFile.text) {
      userContent.push({ type: 'text', text: `Eklenen dosya içeriği (${pendingFile.name}):\n${pendingFile.text}` });
    }
  }
  if (text) userContent.push({ type: 'text', text });

  messages.push({ role: 'user', content: userContent.length === 1 && userContent[0].type === 'text' ? text : userContent });

  pendingImage = null;
  pendingFile = null;
  renderAttachPreview();

  addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await res.json();
    removeTyping();

    const reply = data.content?.[0]?.text || 'Bir hata oluştu, tekrar dene.';
    messages.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);
  } catch (err) {
    removeTyping();
    addMessage('ai', 'Bağlantı hatası oluştu. İnternet bağlantını kontrol et ve tekrar dene. 🌕');
  }

  sendBtn.disabled = false;
}
</script>
